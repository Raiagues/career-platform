<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d12;--sur:#13131a;--sur2:#1a1a24;--sur3:#22222e;
  --bd:#2a2a38;--bd2:#363648;
  --ac:#6ee7b7;--ac2:#60a5fa;
  --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;
  --gr:#22c55e;--ye:#eab308;--re:#ef4444;--bl:#3b82f6;
  --gr-bg:rgba(34,197,94,.1);--ye-bg:rgba(234,179,8,.1);
  --re-bg:rgba(239,68,68,.1);--bl-bg:rgba(59,130,246,.1);
  --r:8px;--rl:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;font-size:14px;}
/* ── APP SHELL ── */
.shell{display:flex;height:100vh;}
.sidebar{width:200px;background:var(--sur);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;}
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
/* ── SIDEBAR ── */
.logo{padding:16px 14px 12px;border-bottom:1px solid var(--bd);}
.logo-t{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--ac);}
.logo-s{font-size:11px;color:var(--tx3);margin-top:2px;}
.nav{flex:1;padding:8px;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--tx2);font-size:13px;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:all .15s;}
.ni:hover{background:var(--sur2);color:var(--tx);}
.ni.on{background:var(--sur3);color:var(--tx);font-weight:500;}
.ni svg{width:15px;height:15px;flex-shrink:0;}
.sf{padding:10px 14px;border-top:1px solid var(--bd);font-size:11px;color:var(--tx3);}
/* ── TOPBAR ── */
.topbar{padding:11px 20px;border-bottom:1px solid var(--bd);background:var(--sur);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-t{font-size:15px;font-weight:600;flex:1;}
/* ── SPLIT LAYOUT (CV page) ── */
.split{flex:1;display:grid;grid-template-columns:420px 1fr;overflow:hidden;}
.split-left{border-right:1px solid var(--bd);overflow-y:auto;padding:20px;}
.split-right{display:flex;flex-direction:column;overflow:hidden;background:#1a1a22;}
.preview-hd{padding:10px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--sur);}
.preview-hd-t{font-size:13px;font-weight:500;flex:1;}
.preview-body{flex:1;overflow:auto;display:flex;justify-content:center;padding:16px;background:#1e1e2c;}
/* ── FULL PAGE LAYOUT (other pages) ── */
.full{flex:1;overflow-y:auto;padding:22px;min-height:0;}
/* ── CARDS / FORMS ── */
.card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;margin-bottom:14px;}
.card-sm{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);padding:11px;margin-bottom:7px;}
.sl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-bottom:8px;display:block;}
label.lb{display:block;font-size:12px;color:var(--tx2);margin-bottom:3px;}
input,textarea,select{display:block;width:100%;background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s;margin-bottom:10px;}
input:focus,textarea:focus,select:focus{border-color:var(--ac2);}
textarea{resize:vertical;line-height:1.55;}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--sur2);color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;font-weight:500;}
.btn:hover{border-color:var(--ac2);color:var(--ac2);}
.btn:active{transform:scale(.98);}
.btn-p{background:var(--ac);border-color:var(--ac);color:#0d0d12;font-weight:600;}
.btn-p:hover{background:#a7f3d0;border-color:#a7f3d0;color:#0d0d12;}
.btn-sm{padding:5px 9px;font-size:12px;}
.btn-d{border-color:var(--re);color:var(--re);}
.btn-d:hover{background:var(--re-bg);}
.btn-ok{border-color:var(--gr);color:var(--gr);}
.btn-ok:hover{background:var(--gr-bg);}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;}
/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
/* ── STAT ── */
.stat{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);padding:12px;text-align:center;}
.sv{font-size:22px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.sl2{font-size:10px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;}
.tg{background:var(--gr-bg);color:var(--gr);}
.ty{background:var(--ye-bg);color:var(--ye);}
.tb{background:var(--bl-bg);color:var(--bl);}
.tp{background:rgba(167,139,250,.12);color:#a78bfa;}
/* ── ACCORDION ── */
.acc{border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;}
.acc-hd{padding:11px 14px;background:var(--sur2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:500;font-size:13px;user-select:none;}
.acc-hd:hover{background:var(--sur3);}
.acc-bd{padding:14px;background:var(--sur);border-top:1px solid var(--bd);}
/* ── ENTRY ── */
.entry{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;}
.ehd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px;}
.mbox{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--rl);padding:22px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;}
/* ── KW ── */
.kw-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.kw-ok{background:var(--gr-bg);color:var(--gr);padding:2px 7px;border-radius:20px;font-size:11px;}
.kw-no{background:var(--re-bg);color:var(--re);padding:2px 7px;border-radius:20px;font-size:11px;}
/* ── SUGGEST ── */
.sug{border-left:3px solid;padding:8px 12px;border-radius:0 var(--r) var(--r) 0;background:var(--sur2);margin-bottom:6px;}
.sug.sg{border-left-color:var(--gr);}
.sug.sy{border-left-color:var(--ye);}
.sug.sb{border-left-color:var(--bl);}
.sug-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sug-b{font-size:12px;color:var(--tx2);line-height:1.6;}
/* ── ANN borders in CV preview ── */
.ann-g{border-left:3px solid var(--gr);padding-left:5px;}
.ann-y{border-left:3px solid var(--ye);padding-left:5px;}
.ann-r{border-left:3px solid var(--re);padding-left:5px;}
/* ── CV PAPER (replicating resume.cls look) ── */
.cv-paper{
  background:white;color:#111;
  width:215mm;min-height:279mm; /* letter */
  padding:7.6mm 10mm 10mm 10mm;
  font-family:'Times New Roman',Times,serif;
  font-size:10pt;line-height:1.35;
  box-shadow:0 4px 28px rgba(0,0,0,.35);
}
.cv-name{font-size:20pt;font-weight:900;text-align:center;text-transform:uppercase;letter-spacing:1px;margin-bottom:2mm;}
.cv-address{text-align:center;font-size:8.5pt;color:#222;margin-bottom:3mm;line-height:1.7;}
.cv-address a{color:#111;text-decoration:none;}
.cv-section{font-size:10pt;font-weight:900;text-transform:uppercase;letter-spacing:.5px;border-bottom:1pt solid #111;margin:3.5mm 0 1.5mm 0;padding-bottom:1px;}
.cv-sub-title{font-weight:700;font-size:10pt;display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.5mm;}
.cv-sub-date{font-size:8.5pt;font-weight:700;}
.cv-sub-org{font-style:italic;font-size:8.5pt;display:flex;justify-content:space-between;margin-bottom:.5mm;}
.cv-bul{list-style:disc;padding-left:14px;margin:0;}
.cv-bul li{font-size:9pt;margin-bottom:1px;line-height:1.35;}
.cv-proj-title{font-weight:700;font-size:9.5pt;display:flex;justify-content:space-between;margin-bottom:.5mm;}
.cv-skills{font-size:9pt;line-height:1.5;}
/* ── LI bar ── */
.lb2{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:4px;}
.lf{height:100%;border-radius:2px;background:var(--ac2);}
/* ── IQ ── */
.iq{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:8px;}
/* ── FB bar ── */
.fb{height:3px;border-radius:2px;background:var(--bd);overflow:hidden;margin-top:3px;}
.ff{height:100%;border-radius:2px;}
/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--sur2);border:1px solid var(--bd2);border-radius:var(--r);padding:9px 16px;font-size:13px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s;}
#toast.show{opacity:1;}
hr.div{border:none;border-top:1px solid var(--bd);margin:12px 0;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
@media(max-width:900px){.split{grid-template-columns:1fr;}.split-right{display:none;}}
</style>

async function runTailor(){

  const out=document.getElementById("tailor-out");
  out.innerHTML=`<div style="text-align:center;padding:20px;color:var(--tx2);font-size:13px;">⏳ Analyzing...</div>`;

  const con=document.getElementById("jd-con")?.checked;
  const ats=document.getElementById("jd-ats")?.checked;
  const pgs=document.getElementById("jd-pg")?.value;

  try{
    const resp=await ai(`Analyze this job description against the candidate's full database. Return ONLY valid JSON, no markdown.
JOB: ${jd}
CANDIDATE DB: ${JSON.stringify({professional:DB.professional,education:DB.education,projects:DB.projects,skills:DB.skills},null,2)}
pages=${pgs}, ATS=${ats}, concise=${con}${con?". Every bullet max 10 words.":""}

JSON structure:
{"jobTitle":"str","company":"str","matchScore":85,"atsScore":72,"summary":"2-3 sentence tailored profile summary","keywordsFound":["k"],"keywordsMissing":["k"],"included":["id"],"excluded":["id"],"annotations":{"id":{"status":"green|yellow|red","reason":"short reason"}},"tailoredBullets":{"id":["bullet"]},"suggestions":[{"type":"success|warn|info","title":"","text":""}],"pageEstimate":"1.8 pages"}
status: green=strong match keep, yellow=maybe include if space, red=consider removing.`,7000);
    let r;try{r=JSON.parse(resp);}catch{const m=resp.match(/\{[\s\S]*\}/);if(m)r=JSON.parse(m[0]);else throw new Error("Parse failed");}

    buildPreview();

    const mc=r.matchScore>=70?"var(--gr)":r.matchScore>=50?"var(--ye)":"var(--re)";
    out.innerHTML=`
    <div style="background:var(--sur2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:10px;">
      <div class="g4" style="margin-bottom:12px;">
        <div class="stat"><div class="sv" style="color:${mc};font-size:20px;">${r.matchScore}%</div><div class="sl2">Match</div></div>
        <div class="stat"><div class="sv" style="color:var(--ac2);font-size:20px;">${r.atsScore}%</div><div class="sl2">ATS</div></div>
        <div class="stat"><div class="sv" style="font-size:18px;">${r.included?.length||0}</div><div class="sl2">Included</div></div>
        <div class="stat"><div class="sv" style="font-size:14px;">${esc(r.pageEstimate||"?")}</div><div class="sl2">Pages</div></div>
      </div>
      ${r.keywordsFound?.length?`<div style="margin-bottom:8px;"><span class="sl">Keywords found</span><div class="kw-wrap">${r.keywordsFound.map(k=>`<span class="kw-ok">${esc(k)}</span>`).join("")}</div></div>`:""}
      ${r.keywordsMissing?.length?`<div style="margin-bottom:8px;"><span class="sl">Missing — add these</span><div class="kw-wrap">${r.keywordsMissing.map(k=>`<span class="kw-no">${esc(k)}</span>`).join("")}</div></div>`:""}
      ${(r.suggestions||[]).map(s=>`<div class="sug s${s.type==="success"?"g":s.type==="warn"?"y":"b"}"><div class="sug-t">${esc(s.title)}</div><div class="sug-b">${esc(s.text)}</div></div>`).join("")}
    </div>
    <div style="font-size:11px;color:var(--tx3);line-height:1.6;padding:8px 10px;background:var(--sur2);border-radius:var(--r);">
      Preview shows 🟢 green / 🟡 yellow / 🔴 red borders per section. Hover for reason. Use the legend toggles above to filter.
    </div>`;
  }catch(e){out.innerHTML=`<div style="color:var(--re);font-size:13px;padding:10px;">Error: ${esc(e.message)}</div>`;}
}

function renderAnnLegend(){
  if(!aResult?.annotations)return;
  const leg=document.getElementById("ann-legend");if(!leg)return;
  const states={green:true,yellow:true,red:true};
  function render(){
    leg.innerHTML=[
      {k:"green",label:"🟢",col:"var(--gr)"},
      {k:"yellow",label:"🟡",col:"var(--ye)"},
      {k:"red",label:"🔴",col:"var(--re)"}
    ].map(a=>`<button style="padding:3px 7px;font-size:11px;border-radius:12px;border:1px solid ${a.col};background:${states[a.k]?a.col+"22":"transparent"};color:${a.col};cursor:pointer;font-family:inherit;" onclick="toggleAnn('${a.k}')">${a.label}</button>`).join("");
  }
  window._annStates=states;
  window._toggleAnn=(k)=>{states[k]=!states[k];render();document.querySelectorAll(".ann-"+k[0]).forEach(el=>el.style.display=states[k]?"":"none");};
  window.toggleAnn=window._toggleAnn;
  render();
}

function buildPreview(){
  const container=document.getElementById("cv-preview");if(!container)return;
  const r=aResult;
  const incl=r?(r.included||[]):null;
  const ann=r?(r.annotations||{}):{};
  const tb=r?(r.tailoredBullets||{}):{};
  const C=DB.personal;

  function ac(id){const a=ann[id];return a?"ann-"+a.status[0]:"";}
  function at(id){const a=ann[id];return a?`title="${esc(a.reason)}"`:"";}
  function bl(id,base){return tb[id]||base||[];}
  function vis(id){return!incl||incl.includes(id);}

  const profV=(DB.professional||[]).filter(e=>vis(e.id));
  const eduV=(DB.education||[]);
  const projV=(DB.projects||[]).filter(e=>vis(e.id));

  let h=`<div class="cv-paper" id="cv-printable">
  <div class="cv-name">${esc(C.name)}</div>
  <div class="cv-address">
    ✉ <a href="mailto:${esc(C.email)}">${esc(C.email)}</a> &nbsp;·&nbsp;
    <a href="${esc(C.linkedin)}" target="_blank">in/ ${esc(C.linkedin_label)}</a> &nbsp;·&nbsp;
    <a href="${esc(C.github)}" target="_blank">github/ ${esc(C.github_label)}</a> &nbsp;·&nbsp;
    <a href="${esc(C.website)}" target="_blank">${esc(C.website_label)}</a> &nbsp;·&nbsp;
    ${esc(C.phone)}
  </div>`;

  // Summary
  const sum=r?.summary||DB.summary;
  if(sum){
    h+=`<div class="cv-section">Profile Summary</div>
    <div style="font-size:9pt;line-height:1.45;margin-bottom:1mm;">${esc(sum)}</div>`;
  }

  // Professional Experience
  if(profV.length){
    h+=`<div class="cv-section">Professional Experience</div>`;
    profV.forEach(e=>{
      const bs=bl(e.id,e.bullets);
      h+=`<div class="${ac(e.id)}" ${at(e.id)} style="margin-bottom:2.5mm;">
        <div class="cv-sub-title"><span>${esc(e.title)}</span><span class="cv-sub-date">${esc(e.date)}</span></div>
        <div class="cv-sub-org"><span>${esc(e.org)}</span><span>${esc(e.loc)}</span></div>
        <ul class="cv-bul">${bs.map(b=>`<li>${esc(b)}</li>`).join("")}</ul>
      </div>`;
    });
  }

  // Education
  if(eduV.length){
    h+=`<div class="cv-section">Education</div>`;
    eduV.forEach(e=>{
      const bs=e.bullets||[];
      h+=`<div style="margin-bottom:2.5mm;">
        <div class="cv-sub-title"><span>${esc(e.title)}</span><span class="cv-sub-date">${esc(e.date)}</span></div>
        <div class="cv-sub-org"><span>${esc(e.org)}</span><span>${esc(e.loc)}</span></div>
        ${bs.length?`<ul class="cv-bul">${bs.map(b=>`<li>${esc(b)}</li>`).join("")}</ul>`:""}
      </div>`;
    });
  }

  // Projects
  if(projV.length){
    h+=`<div class="cv-section">Projects</div>`;
    projV.forEach(e=>{
      const bs=bl(e.id,e.bullets);
      h+=`<div class="${ac(e.id)}" ${at(e.id)} style="margin-bottom:2mm;">
        <div class="cv-proj-title"><span>${esc(e.title)}</span><span style="font-size:8.5pt;">${esc(e.date)}</span></div>
        <ul class="cv-bul">${bs.map(b=>`<li>${esc(b)}</li>`).join("")}</ul>
      </div>`;
    });
  }

  // Skills
  h+=`<div class="cv-section">Skills</div>
  <div class="cv-skills">
    <b>Programming:</b> ${esc(DB.skills.programming)}<br>
    <b>Tools:</b> ${esc(DB.skills.tools)}<br>
    <b>Embedded Electronics:</b> ${esc(DB.skills.hardware)}<br>
    <b>Languages:</b> ${esc(DB.skills.languages)}
  </div>`;

  h+=`</div>`; // cv-paper
  container.innerHTML=h;
}

/* ════════════════════════════════════════════
   LATEX GENERATION (resume.cls format)
════════════════════════════════════════════ */
function genTex(){
  const r=aResult;
  const incl=r?(r.included||[]):null;
  const tb=r?(r.tailoredBullets||{}):{};
  const bl=(id,base)=>tb[id]||base||[];
  const vis=id=>!incl||incl.includes(id);
  const C=DB.personal;

  const profV=(DB.professional||[]).filter(e=>vis(e.id));
  const projV=(DB.projects||[]).filter(e=>vis(e.id));

  function rSubsection(title,date,org,loc,bullets){
    const items=bullets.map(b=>`        \\item ${texBullet(b)}\n        \\vspace{-0.5em}`).join("\n");
    return `    \\begin{rSubsection}{${te(title)}}{${te(date)}}{${te(org)}}{${te(loc)}}\n${items}\n    \\end{rSubsection}`;
  }

  function projBlock(title,date,bullets){
    const items=bullets.map(b=>`        \\item ${texBullet(b)}\n        \\vspace{-0.5em}`).join("\n");
    return `    {\\bf ${te(title)}} \\hfill {\\bf \\small ${te(date)}}\n    \\vspace{-0.5em}\n    \\begin{itemize}\n    \\small\n${items}\n    \\end{itemize}`;
  }

  const sum=r?.summary||DB.summary;

  tex=`\\documentclass{resume} 
\\usepackage[left=0.4in,top=0.3in,right=0.4in,bottom=0.4in]{geometry}
\\usepackage{fontawesome}
\\usepackage[pdftex]{hyperref}
\\usepackage{times}
\\usepackage{enumitem}
\\hypersetup{colorlinks=true,linkcolor=black,urlcolor=black}
\\newcommand{\\tab}[1]{\\hspace{.2667\\textwidth}\\rlap{#1}}
\\newcommand{\\itab}[1]{\\hspace{0em}\\rlap{#1}}
\\name{${te(C.name)}}
\\usepackage[utf8]{inputenc}
\\usepackage[T1]{fontenc}

\\address{
    \\hspace{0.5cm}
    \\faEnvelope\\ \\href{mailto:${C.email}}{${C.email}} \\hspace{0.5cm}
    \\faLinkedin\\ \\href{${C.linkedin}}{${te(C.linkedin_label)}} \\hspace{0.5cm}
    \\faGithub\\ \\href{${C.github}}{${te(C.github_label)}} \\hspace{0.5cm}
    \\faLink\\ \\href{${C.website}}{${te(C.website_label)}} \\hspace{0.5cm}
    \\faPhone\\ ${te(C.phone)} \\hspace{0.5cm}
}

\\begin{document}

${sum?`\\begin{rSection}{Profile Summary}
${texBullet(sum)}
\\end{rSection}

`:``}\\begin{rSection}{Professional Experience}

${profV.map(e=>rSubsection(e.title,e.date,e.org,e.loc,bl(e.id,e.bullets))).join("\n\n")}
 
\\end{rSection}


\\begin{rSection}{Education}

${(DB.education||[]).map(e=>rSubsection(e.title,e.date,e.org,e.loc,e.bullets||[])).join("\n\n")}
    
\\end{rSection}


${projV.length?`\\begin{rSection}{Projects}
    \\itemsep -3pt   
    
${projV.map(e=>projBlock(e.title,e.date,bl(e.id,e.bullets))).join("\n\n")}

\\end{rSection}


`:``}\\begin{rSection}{Skills}
    \\textbf{Programming:} ${DB.skills.programming} \\\\
    \\textbf{Tools:} ${DB.skills.tools}\\\\
    \\textbf{Embedded Electronics:} ${DB.skills.hardware}\\\\
    \\textbf{Languages:} ${DB.skills.languages}
\\end{rSection}



\\end{document}
`;
  return tex;
}

function te(s){
  if(!s)return"";
  return String(s)
    .replace(/&(?!amp;)/g,"\\&")
    .replace(/%(?!\\)/g,"\\%")
    .replace(/\$(?!\\)/g,"\\$")
    .replace(/#/g,"\\#");
}
function texBullet(s){
  if(!s)return String(s||"");
  // preserve already-escaped sequences
  return String(s)
    .replace(/(?<!\\)&/g,"\\&")
    .replace(/(?<!\\)#/g,"\\#");
}

function dlTex(){
  const code=genTex();
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([code],{type:"text/plain"}));
  a.download="cv.tex";a.click();
  toast("Downloaded cv.tex — commit to your repo to compile automatically!");
}

function dlPDF(){
  if(window._pdfBlob){
    const a=document.createElement("a");a.href=URL.createObjectURL(window._pdfBlob);
    a.download=(DB.personal.name||"cv").replace(/\s+/g,"_").toLowerCase()+"_cv.pdf";
    a.click();
  }else{
    // Try to load from GitHub Pages compiled version
    fetch("./cv.pdf").then(r=>{if(r.ok)return r.blob();throw new Error("not found");})
      .then(blob=>{window._pdfBlob=blob;dlPDF();})
      .catch(()=>toast("No compiled PDF yet — download .tex and commit to repo","warn"));
  }
}

function toggleAcc(k){accState[k]=accState[k]===false;renderDB();}

function openModal(key,idx){
  const m=SMETA[key];if(!m)return;
  const isNew=idx===-1;const e=isNew?{}:(DB[key][idx]||{});
  let h=`<div style="font-size:15px;font-weight:600;margin-bottom:14px;">${isNew?"Add":"Edit"} ${m.label.replace(/s$/,"")}</div>`;
  m.fields.forEach(f=>{h+=`<label class="lb">${FL[f]||f}</label><input id="mf-${f}" value="${esc(e[f]||"")}">`;});
  if(m.kw)h+=`<label class="lb">Keywords (comma-separated, for ATS matching)</label><input id="mf-kw" value="${esc((e.keywords||[]).join(", "))}">`;
  if(m.bl)h+=`<label class="lb">Bullet points (one per line)</label><textarea id="mf-bl" rows="7">${esc((e.bullets||[]).join("\n"))}</textarea>`;
  h+=`<div class="btn-row" style="margin-top:8px;"><button class="btn btn-p" style="flex:1;justify-content:center;" onclick="saveModal('${key}',${idx})">✓ Save</button><button class="btn" onclick="closeModal()">Cancel</button></div>`;
  showModal(h);
}

function saveModal(key,idx){
  const m=SMETA[key];if(!m)return;
  const e={};
  m.fields.forEach(f=>{const el=document.getElementById("mf-"+f);if(el)e[f]=el.value.trim();});
  if(m.kw){const el=document.getElementById("mf-kw");if(el)e.keywords=el.value.split(",").map(s=>s.trim()).filter(Boolean);}
  if(m.bl){const el=document.getElementById("mf-bl");if(el)e.bullets=el.value.split("\n").map(s=>s.trim()).filter(Boolean);}
  e.id=idx===-1?"e"+Date.now():(DB[key][idx]?.id||"e"+Date.now());
  if(idx===-1)DB[key].push(e);else DB[key][idx]=e;
  dbSave();closeModal();renderDB();toast("Saved!");
}

function delEntry(key,idx){if(!confirm("Delete?"))return;DB[key].splice(idx,1);dbSave();renderDB();}

function dbSaveFields(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():"";};
  ["name","email","phone","linkedin","linkedin_label","github","github_label","website","website_label"]
    .forEach(f=>{const v=g("p-"+f);if(v!==undefined)DB.personal[f]=v;});
  DB.summary=g("p-summary");
  if(document.getElementById("sk-prog")){
    DB.skills.programming=g("sk-prog");
    DB.skills.tools=g("sk-tools");
    DB.skills.hardware=g("sk-hw");
    DB.skills.languages=g("sk-lang");
  }
  dbSave();toast("All changes saved!");
  // refresh preview if on cv page
  if(page==="cv")buildPreview();
}

function dbClear(){if(!confirm("Erase all data?"))return;DB=JSON.parse(JSON.stringify({personal:{name:"",email:"",phone:"",linkedin:"",linkedin_label:"",github:"",github_label:"",website:"",website_label:""},summary:"",professional:[],education:[],projects:[],skills:{programming:"",tools:"",hardware:"",languages:""}}));dbSave();renderDB();}

async function runCL(){
  const co=document.getElementById("cl-co")?.value.trim(),ro=document.getElementById("cl-ro")?.value.trim();

  const out=document.getElementById("cl-out");out.innerHTML=`<div style="text-align:center;padding:20px;color:var(--tx2);">⏳ Writing...</div>`;
  const jd=document.getElementById("cl-jd")?.value.trim();
  const to=document.getElementById("cl-to")?.value;
  const la=document.getElementById("cl-la")?.value;
  const tmap={professional:"formal and professional",enthusiastic:"enthusiastic and personal, showing genuine passion for space",concise:"very concise and direct, max 3 tight paragraphs"};
  const lmap={en:"English",pt:"Brazilian Portuguese",fr:"French"};
  try{
    const text=await ai(`Write a cover letter for ${DB.personal.name} applying for ${ro} at ${co}.
CANDIDATE: ${JSON.stringify({personal:DB.personal,summary:DB.summary,professional:DB.professional,education:DB.education,skills:DB.skills},null,2)}
JOB: ${jd||ro+" at "+co}  TONE: ${tmap[to]}.  Language: ${lmap[la]}.
Structure: Hook → why this company specifically → most relevant experience with 2-3 concrete metrics → skills match → call to action.
Return ONLY the letter text.`,1800);
    out.innerHTML=`<div class="card" style="margin-top:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div style="font-weight:600;">Cover Letter — ${esc(co)}</div>
        <div class="btn-row"><button class="btn btn-sm" onclick="cpEl('cl-txt')">📋 Copy</button><button class="btn btn-sm btn-p" onclick="runCL()">↻ Regenerate</button></div>
      </div>
      <textarea id="cl-txt" rows="22" style="font-size:13px;line-height:1.7;">${esc(text)}</textarea>
    </div>`;
  }catch(e){out.innerHTML=`<div style="color:var(--re);padding:10px;">Error: ${esc(e.message)}</div>`;}
}

let ivTab="browse";

    <button style="padding:7px 14px;background:none;border:none;border-bottom:2px solid ${ivTab==="practice"?"var(--ac)":"transparent"};color:${ivTab==="practice"?"var(--ac)":"var(--tx2)"};font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;margin-bottom:-1px;" onclick="ivSwitch('practice')">AI Mock Interview</button>

  </div>
  <div id="iv-body"></div></div>`;

function ivSwitch(t){ivTab=t;pageIV();}
function renderIVBody(){
  const b=document.getElementById("iv-body");if(!b)return;
  const ivs=ivLoad();
  if(ivTab==="browse")b.innerHTML=renderBrowse(ivs);
  else if(ivTab==="practice")b.innerHTML=renderPractice();
  else b.innerHTML=renderTips();
}
function renderBrowse(ivs){
  const cos=[...new Set(ivs.map(i=>i.company))].sort();
  if(!ivs.length)return`<div style="text-align:center;padding:48px;color:var(--tx3);"><div style="font-size:32px;margin-bottom:10px;">💬</div>No approved questions yet. Be the first to submit.</div>`;
  return`<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
    <select id="fil-co" onchange="filterQ()" style="flex:1;min-width:150px;"><option value="">All companies</option>${cos.map(c=>`<option>${esc(c)}</option>`).join("")}</select>
    <select id="fil-ty" onchange="filterQ()" style="flex:1;min-width:150px;"><option value="">All types</option><option value="technical">Technical</option><option value="behavioral">Behavioral</option><option value="motivational">Motivational</option></select>
  </div>
  <div id="q-list">${ivs.map((q,i)=>qcard(q,i)).join("")}</div>`;
}
function qcard(q,i){
  return`<div class="iq"><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;"><span class="tag tb">${esc(q.company)}</span><span class="tag ty">${esc(q.type||"general")}</span>${q.role?`<span class="tag tp">${esc(q.role)}</span>`:""}</div>
  <div style="font-weight:500;font-size:14px;margin-bottom:5px;">${esc(q.question)}</div>
  ${q.context?`<div style="font-size:12px;color:var(--tx2);margin-bottom:5px;">ℹ ${esc(q.context)}</div>`:""}
  ${q.sampleAnswer?`<details><summary style="cursor:pointer;font-size:12px;color:var(--tx2);">Sample answer</summary><div style="font-size:12px;color:var(--tx2);padding:7px 0;line-height:1.6;white-space:pre-wrap;">${esc(q.sampleAnswer)}</div></details>`:""}
  ${q.tips?`<div style="background:var(--ye-bg);color:var(--ye);padding:5px 9px;border-radius:var(--r);font-size:12px;margin:5px 0;">💡 ${esc(q.tips)}</div>`:""}
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px;margin-top:6px;">
    ${q.submittedBy?`<span style="font-size:11px;color:var(--tx3);">by ${esc(q.submittedBy)}</span>`:"<span></span>"}
    <button class="btn btn-sm" onclick="practiceQ(${i})">✦ Practice with AI</button>
  </div></div>`;
}
function filterQ(){
  const co=document.getElementById("fil-co")?.value,ty=document.getElementById("fil-ty")?.value;
  const all=ivLoad().filter(q=>(!co||q.company===co)&&(!ty||q.type===ty));
  const l=document.getElementById("q-list");
  if(l)l.innerHTML=all.length?all.map((q,i)=>qcard(q,i)).join(""):`<div style="text-align:center;padding:28px;color:var(--tx3);">No questions match.</div>`;
}
function renderPractice(){
  return`<div class="card"><span class="sl">AI Mock Interview Session</span>
    <label class="lb">Target company / role</label><input id="pr-co" placeholder="e.g. ESA — Embedded Software Engineer">
    <label class="lb">Interview type</label><select id="pr-ty" style="margin-bottom:10px;"><option value="technical">Technical</option><option value="behavioral">Behavioral (STAR)</option><option value="motivational">Motivational</option><option value="mixed">Mixed</option></select>
    <button class="btn btn-p" onclick="startMock()">▶ Start Session</button>
  </div><div id="mock-out"></div>`;
}
async function startMock(){
  const co=document.getElementById("pr-co")?.value.trim()||"a space company";

    const resp=await ai(`You are an interviewer at ${co}. Generate a realistic 5-question ${ty} interview.

    let r;try{r=JSON.parse(resp);}catch{const m=resp.match(/\{[\s\S]*\}/);if(m)r=JSON.parse(m[0]);else throw new Error("Parse failed");}
    out.innerHTML=`<div class="card" style="margin-top:10px;"><div style="font-weight:600;font-size:15px;margin-bottom:4px;">${esc(r.sessionTitle||"")}</div><div style="font-size:13px;color:var(--tx2);margin-bottom:14px;">${esc(r.intro||"")}</div>

      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);margin-bottom:5px;">Q${qi+1} · <span class="tag t${q.type==="technical"?"b":q.type==="behavioral"?"y":"p"}" style="font-size:10px;">${esc(q.type)}</span></div>
      <div style="font-weight:500;font-size:14px;margin-bottom:9px;">${esc(q.q)}</div>
      <label class="lb">Your answer</label><textarea id="an-${qi}" rows="4" placeholder="Write your answer..."></textarea>
      <details style="margin-bottom:7px;"><summary style="cursor:pointer;font-size:12px;color:var(--tx2);">What they're looking for</summary>

async function getFB(qi,question,hint){
  const ans=document.getElementById("an-"+qi)?.value.trim();
  if(!ans){toast("Write your answer first","warn");return;}
  const area=document.getElementById("fb-"+qi);area.innerHTML=`<div style="font-size:12px;color:var(--tx2);padding:5px 0;">Analyzing...</div>`;
  try{
    const resp=await ai(`Question:"${question}"\nLooking for:"${hint}"\nAnswer:"${ans}"\nReturn ONLY JSON:{"score":75,"strengths":["s"],"improvements":["i"],"closingSuggestion":"better ending"}`,700);
    let r;try{r=JSON.parse(resp);}catch{const m=resp.match(/\{[\s\S]*\}/);if(m)r=JSON.parse(m[0]);else throw new Error("Parse failed");}
    const col=r.score>=70?"var(--gr)":r.score>=50?"var(--ye)":"var(--re)";
    area.innerHTML=`<div style="border-top:1px solid var(--bd);margin-top:9px;padding-top:9px;"><div style="display:flex;align-items:center;gap:9px;margin-bottom:7px;"><span style="font-weight:600;color:${col};">${r.score}/100</span><div class="fb" style="flex:1;max-width:120px;"><div class="ff" style="width:${r.score}%;background:${col};"></div></div></div>
    ${(r.strengths||[]).map(s=>`<div style="font-size:12px;color:var(--gr);margin-bottom:2px;">✓ ${esc(s)}</div>`).join("")}
    ${(r.improvements||[]).map(s=>`<div style="font-size:12px;color:var(--ye);margin-bottom:2px;">↑ ${esc(s)}</div>`).join("")}
    ${r.closingSuggestion?`<div style="background:var(--bl-bg);border-radius:var(--r);padding:7px 10px;font-size:12px;margin-top:5px;color:var(--tx2);font-style:italic;">"${esc(r.closingSuggestion)}"</div>`:""}
    </div>`;
  }catch(e){area.innerHTML=`<div style="font-size:12px;color:var(--re);">${esc(e.message)}</div>`;}
}
function practiceQ(idx){
  const q=ivLoad()[idx];if(!q)return;
  showModal(`<div style="font-size:15px;font-weight:600;margin-bottom:12px;">Practice — ${esc(q.company)}</div>
  <div style="background:var(--sur2);border-radius:var(--r);padding:10px;margin-bottom:12px;"><div style="display:flex;gap:5px;margin-bottom:5px;"><span class="tag tb">${esc(q.company)}</span><span class="tag ty">${esc(q.type)}</span></div><div style="font-weight:500;">${esc(q.question)}</div></div>
  <label class="lb">Your answer</label><textarea id="prac-ans" rows="7" placeholder="Use STAR method for behavioral questions..."></textarea>
  <div class="btn-row"><button class="btn btn-p" onclick="pracFB('${ej(q.question)}','${ej(q.hint||"")}')">✦ Get Feedback</button><button class="btn" onclick="closeModal()">Close</button></div>
  <div id="prac-fb"></div>`);
}
async function pracFB(question,hint){
  const ans=document.getElementById("prac-ans")?.value.trim();if(!ans){toast("Write your answer first","warn");return;}
  const area=document.getElementById("prac-fb");area.innerHTML=`<div style="font-size:12px;color:var(--tx2);padding:9px 0;">Analyzing...</div>`;
  try{
    const resp=await ai(`Question:"${question}"\nLooking for:"${hint}"\nAnswer:"${ans}"\nReturn ONLY JSON:{"score":75,"strengths":["s"],"improvements":["i"],"closingSuggestion":"better ending"}`,700);
    let r;try{r=JSON.parse(resp);}catch{const m=resp.match(/\{[\s\S]*\}/);if(m)r=JSON.parse(m[0]);else throw new Error("Parse failed");}
    const col=r.score>=70?"var(--gr)":r.score>=50?"var(--ye)":"var(--re)";
    area.innerHTML=`<div style="border-top:1px solid var(--bd);margin-top:10px;padding-top:10px;"><div style="font-weight:600;font-size:14px;color:${col};margin-bottom:7px;">${r.score}/100</div>
    ${(r.strengths||[]).map(s=>`<div style="font-size:13px;color:var(--gr);margin-bottom:3px;">✓ ${esc(s)}</div>`).join("")}
    ${(r.improvements||[]).map(s=>`<div style="font-size:13px;color:var(--ye);margin-bottom:3px;">↑ ${esc(s)}</div>`).join("")}
    ${r.closingSuggestion?`<div style="background:var(--bl-bg);border-radius:var(--r);padding:9px;font-size:13px;margin-top:7px;color:var(--tx2);font-style:italic;">"${esc(r.closingSuggestion)}"</div>`:""}
    </div>`;
  }catch(e){area.innerHTML=`<div style="font-size:12px;color:var(--re);">${esc(e.message)}</div>`;}
}

      <div style="margin-bottom:10px;"><span class="sl">Typical questions</span>${(r.typicalQuestions||[]).map(x=>`<div style="font-size:13px;color:var(--tx2);padding:3px 0;border-bottom:1px solid var(--bd);">❓ ${esc(x)}</div>`).join("")}</div>
      <div style="margin-bottom:10px;"><span class="sl">How to frame your experience</span>${(r.howToFrame||[]).map(x=>`<div style="font-size:13px;color:var(--tx2);padding:2px 0;">✅ ${esc(x)}</div>`).join("")}</div>
      <div><span class="sl">Red flags</span>${(r.redFlags||[]).map(x=>`<div style="font-size:13px;color:var(--ye);padding:2px 0;">⚠ ${esc(x)}</div>`).join("")}</div>
    </div>`;
  }catch(e){out.innerHTML=`<div style="color:var(--re);">${esc(e.message)}</div>`;}
}
function submitModal(){
  showModal(`<div style="font-size:15px;font-weight:600;margin-bottom:12px;">Submit an Interview Question</div>
  <div style="background:var(--ye-bg);border:1px solid rgba(234,179,8,.2);border-radius:var(--r);padding:9px 11px;margin-bottom:12px;font-size:12px;color:var(--ye);">⏳ Reviewed by admin before appearing publicly.</div>
  <label class="lb">Your name (optional)</label><input id="s-name" placeholder="Anonymous">
  <label class="lb">Company *</label><input id="s-co" placeholder="e.g. ESA, Planet Labs, Airbus, CNES...">
  <label class="lb">Role applied for</label><input id="s-ro" placeholder="e.g. Embedded Systems Engineer">
  <label class="lb">Question type *</label><select id="s-ty" style="margin-bottom:10px;"><option value="technical">Technical</option><option value="behavioral">Behavioral</option><option value="motivational">Motivational</option></select>
  <label class="lb">The question *</label><textarea id="s-q" rows="3" placeholder="Write the question exactly as asked..."></textarea>
  <label class="lb">Context</label><input id="s-ctx" placeholder="e.g. 1st technical round, 45 min">
  <label class="lb">Sample answer / approach</label><textarea id="s-ans" rows="4" placeholder="How did you answer this?"></textarea>
  <label class="lb">Tips for others</label><input id="s-tip" placeholder="Key insight to answer well...">
  <div class="btn-row" style="margin-top:8px;"><button class="btn btn-p" style="flex:1;justify-content:center;" onclick="submitQ()">↗ Submit for Review</button><button class="btn" onclick="closeModal()">Cancel</button></div>`);
}
function submitQ(){
  const co=document.getElementById("s-co")?.value.trim(),q=document.getElementById("s-q")?.value.trim();
  if(!co||!q){toast("Company and question required","warn");return;}
  const p=pendLoad();
  p.push({id:"q"+Date.now(),company:co,question:q,role:document.getElementById("s-ro")?.value.trim()||"",type:document.getElementById("s-ty")?.value||"technical",context:document.getElementById("s-ctx")?.value.trim()||"",sampleAnswer:document.getElementById("s-ans")?.value.trim()||"",tips:document.getElementById("s-tip")?.value.trim()||"",submittedBy:document.getElementById("s-name")?.value.trim()||"Anonymous",submittedAt:new Date().toISOString()});
  pendSave(p);closeModal();toast("Submitted! Pending admin review.");
}

/* ════════════════════════════════════════════
   ADMIN PAGE
════════════════════════════════════════════ */
function pageAD(){
  const wb=document.getElementById("workspace-body");wb.style.cssText="flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column;";
  wb.innerHTML=`<div class="full"><div style="font-size:16px;font-weight:600;margin-bottom:14px;">Admin Panel</div>
  ${!adminOk?`<div class="card" style="max-width:360px;"><span class="sl">Admin Access</span><label class="lb">Password</label><input id="pw" type="password" placeholder="Enter admin password"><button class="btn btn-p" onclick="unlock()">🔓 Unlock</button></div>`:`<div id="ad-body"></div>`}</div>`;
  if(adminOk)loadAdminBody();
}
function unlock(){const pw=document.getElementById("pw")?.value;if(pw===ADMIN_PW){adminOk=true;pageAD();}else toast("Wrong password","warn");}
function loadAdminBody(){
  const p=pendLoad(),a=ivLoad(),body=document.getElementById("ad-body");if(!body)return;
  body.innerHTML=`<div style="display:flex;gap:10px;margin-bottom:14px;max-width:260px;">
    <div class="stat"><div class="sv" style="color:var(--ye);">${p.length}</div><div class="sl2">Pending</div></div>
    <div class="stat"><div class="sv" style="color:var(--gr);">${a.length}</div><div class="sl2">Approved</div></div>
  </div>
  ${p.length?`<div style="font-weight:600;font-size:14px;margin-bottom:8px;">Pending Review</div>
  ${p.map((q,i)=>`<div class="card-sm" style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;">
    <div style="flex:1;"><div style="display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap;"><span class="tag ty">Pending</span><span class="tag tb">${esc(q.company)}</span><span class="tag tp">${esc(q.type)}</span></div>
    <div style="font-weight:500;margin-bottom:3px;">${esc(q.question)}</div>
    ${q.sampleAnswer?`<div style="font-size:12px;color:var(--tx2);">${esc(q.sampleAnswer)}</div>`:""}
    <div style="font-size:11px;color:var(--tx3);margin-top:3px;">by ${esc(q.submittedBy)} · ${new Date(q.submittedAt).toLocaleDateString()}</div></div>
    <div class="btn-row"><button class="btn btn-sm btn-ok" onclick="approveQ(${i})">✓</button><button class="btn btn-sm btn-d" onclick="rejectQ(${i})">✗</button></div>
  </div></div>`).join("")}`:`<div style="color:var(--tx3);margin-bottom:14px;">No pending submissions.</div>`}
  ${a.length?`<hr class="div"><div style="font-weight:600;font-size:14px;margin-bottom:8px;">Approved (${a.length})</div>
  ${a.map((q,i)=>`<div class="entry" style="margin-bottom:5px;"><div class="ehd"><div style="flex:1;"><div style="display:flex;gap:4px;margin-bottom:2px;"><span class="tag tg">Live</span><span class="tag tb">${esc(q.company)}</span></div><div style="font-size:13px;">${esc(q.question)}</div></div><button class="btn btn-sm btn-d" onclick="removeQ(${i})">🗑</button></div></div>`).join("")}`:""}`;
}
function approveQ(i){const p=pendLoad(),q=p[i];if(!q)return;const a=ivLoad();a.push(q);p.splice(i,1);ivSave(a);pendSave(p);toast("Approved!");loadAdminBody();}
function rejectQ(i){const p=pendLoad();p.splice(i,1);pendSave(p);toast("Rejected");loadAdminBody();}
function removeQ(i){if(!confirm("Remove?"))return;const a=ivLoad();a.splice(i,1);ivSave(a);loadAdminBody();}

/* ════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════ */
async function ai(prompt,max=1000){
  const r=await fetch(AI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:AI_MODEL,max_tokens:max,messages:[{role:"user",content:prompt}]})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"API error");
  return(d.content||[]).map(i=>i.text||"").join("");
}
function esc(s){if(s==null)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function ej(s){if(s==null)return"";return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g,"\\n");}
function cpEl(id){const el=document.getElementById(id);if(el)navigator.clipboard.writeText(el.value||el.textContent).then(()=>toast("Copied!"));}
function showModal(h){document.getElementById("mbox").innerHTML=h;document.getElementById("mbg").style.display="flex";}
function closeModal(){document.getElementById("mbg").style.display="none";}
let _tt;
function toast(msg,type="info"){const el=document.getElementById("toast");el.textContent=msg;el.style.borderColor=type==="warn"?"var(--ye)":type==="info"?"var(--ac2)":"var(--bd2)";el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),2600);}

════════════════════════════════════════════ */
DB = LS.g("ch_db") || JSON.parse(JSON.stringify(SEED));
renderNav();
go("cv");
