<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aerospace Career Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d12;--surface:#13131a;--surface2:#1a1a24;--surface3:#22222e;
  --border:#2a2a38;--border2:#363648;
  --accent:#6ee7b7;--accent2:#60a5fa;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;
  --green-bg:rgba(34,197,94,.1);--yellow-bg:rgba(234,179,8,.1);
  --red-bg:rgba(239,68,68,.1);--blue-bg:rgba(59,130,246,.1);
  --r:8px;--rl:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
a{color:var(--accent2);text-decoration:none;}
/* layout */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:216px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
/* sidebar */
.logo{padding:18px 16px 12px;border-bottom:1px solid var(--border);}
.logo-title{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.nav{flex:1;padding:8px;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:13px;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:all .15s;}
.ni:hover{background:var(--surface2);color:var(--text);}
.ni.on{background:var(--surface3);color:var(--text);font-weight:500;}
.ni svg{width:15px;height:15px;flex-shrink:0;}
.sf{padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);}
/* topbar */
.topbar{padding:12px 22px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:600;}
/* content */
.content{flex:1;overflow-y:auto;padding:22px;}
/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px;}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;}
.sl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px;display:block;}
/* forms */
label.lb{display:block;font-size:12px;color:var(--text2);margin-bottom:3px;}
input,textarea,select{display:block;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:7px 11px;outline:none;transition:border-color .15s;margin-bottom:10px;}
input:focus,textarea:focus,select:focus{border-color:var(--accent2);}
textarea{resize:vertical;line-height:1.6;}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;font-weight:500;}
.btn:hover{border-color:var(--accent2);color:var(--accent2);}
.btn:active{transform:scale(.98);}
.btn-p{background:var(--accent);border-color:var(--accent);color:#0d0d12;font-weight:600;}
.btn-p:hover{background:#a7f3d0;border-color:#a7f3d0;color:#0d0d12;}
.btn-sm{padding:5px 9px;font-size:12px;}
.btn-d{border-color:var(--red);color:var(--red);}
.btn-d:hover{background:var(--red-bg);}
.btn-ok{border-color:var(--green);color:var(--green);}
.btn-ok:hover{background:var(--green-bg);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
/* grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
/* stat */
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center;}
.sv{font-size:24px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.sl2{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
/* tags */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.tg{background:var(--green-bg);color:var(--green);}
.ty{background:var(--yellow-bg);color:var(--yellow);}
.tb{background:var(--blue-bg);color:var(--blue);}
.tp{background:rgba(167,139,250,.12);color:#a78bfa;}
/* accordion */
.acc{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;}
.acc-hd{padding:12px 14px;background:var(--surface2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:500;font-size:13px;user-select:none;}
.acc-hd:hover{background:var(--surface3);}
.acc-bd{padding:14px;background:var(--surface);border-top:1px solid var(--border);}
/* tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tb2{padding:7px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:-1px;font-weight:500;transition:all .15s;}
.tb2:hover{color:var(--text);}
.tb2.on{color:var(--accent);border-bottom-color:var(--accent);}
/* entry */
.entry{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:7px;}
.ehd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
/* modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px;}
.mbox{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:22px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;}
/* kw */
.kw-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.kw-ok{background:var(--green-bg);color:var(--green);padding:2px 7px;border-radius:20px;font-size:11px;}
.kw-no{background:var(--red-bg);color:var(--red);padding:2px 7px;border-radius:20px;font-size:11px;}
/* suggest */
.sug{border-left:3px solid;padding:9px 12px;border-radius:0 var(--r) var(--r) 0;background:var(--surface2);margin-bottom:7px;}
.sug.sg{border-left-color:var(--green);}
.sug.sy{border-left-color:var(--yellow);}
.sug.sb{border-left-color:var(--blue);}
.sug-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sug-b{font-size:12px;color:var(--text2);line-height:1.6;}
/* pdf viewer */
.pdf-wrap{background:var(--surface2);border-radius:var(--rl);padding:10px;}
.pdf-wrap iframe{width:100%;border:none;border-radius:var(--r);}
/* tex */
.tex-block{background:#10101a;border:1px solid var(--border);border-radius:var(--r);padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.8;color:#9090b8;white-space:pre-wrap;overflow:auto;max-height:500px;}
.tc{color:#6ee7b7;}.ta{color:#60a5fa;}.tco{color:#404060;}
/* li bar */
.lb2{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
.lf{height:100%;border-radius:2px;background:var(--accent2);}
/* fb bar */
.fb{height:3px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:3px;}
.ff{height:100%;border-radius:2px;}
/* iq */
.iq{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px;}
/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:9px 18px;font-size:13px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s;}
#toast.show{opacity:1;}
hr.div{border:none;border-top:1px solid var(--border);margin:14px 0;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
@media(max-width:700px){.app{flex-direction:column;}.sidebar{width:100%;height:auto;}.nav{display:flex;overflow-x:auto;padding:6px;}.ni{flex-shrink:0;}.g2,.g4{grid-template-columns:1fr;}}
</style>
</head>

function openModal(key, idx){

  let h = `<div style="font-size:15px;font-weight:600;margin-bottom:14px;">${isNew?"Add":"Edit"} ${m.label.replace(/s$/,"").replace(/ \/.*/,"")}</div>`;
  m.fields.forEach(f => { h += `<label class="lb">${FL[f]||f}</label><input id="mf-${f}" value="${esc(e[f]||"")}">` });
  if(m.kw) h += `<label class="lb">Keywords (comma-separated)</label><input id="mf-kw" value="${esc((e.keywords||[]).join(", "))}">`;
  if(m.bl) h += `<label class="lb">Bullets (one per line)</label><textarea id="mf-bl" rows="6">${esc((e.bullets||[]).join("\n"))}</textarea>`;
  if(m.dt) h += `<label class="lb">Details / Highlights (one per line)</label><textarea id="mf-dt" rows="4">${esc((e.details||[]).join("\n"))}</textarea>`;
  h += `<div class="btn-row" style="margin-top:8px;">

}

function saveModal(key, idx){
  const m = SMETA[key]; if(!m) return;
  const e = {};
  m.fields.forEach(f=>{ const el=document.getElementById("mf-"+f); if(el) e[f]=el.value.trim(); });
  if(m.kw){ const el=document.getElementById("mf-kw"); if(el) e.keywords=el.value.split(",").map(s=>s.trim()).filter(Boolean); }
  if(m.bl){ const el=document.getElementById("mf-bl"); if(el) e.bullets=el.value.split("\n").map(s=>s.trim()).filter(Boolean); }
  if(m.dt){ const el=document.getElementById("mf-dt"); if(el) e.details=el.value.split("\n").map(s=>s.trim()).filter(Boolean); }
  e.id = idx===-1 ? "e"+Date.now() : (DB[key][idx]?.id||"e"+Date.now());
  if(idx===-1) DB[key].push(e); else DB[key][idx]=e;
  dbSave(); closeModal(); pageDB(); toast("Saved!");
}

/* Compile in-browser by sending to a local server if available, else show instructions */
async function compileBrowser(){
  if(!tex){ await genTex(); }
  // Try local server first
  try{
    const r = await fetch("http://localhost:8765/compile",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({latex:tex}), signal:AbortSignal.timeout(20000)
    });
    const d = await r.json();
    if(d.ok){
      const arr = Uint8Array.from(atob(d.pdf),c=>c.charCodeAt(0));
      window._pdfBlob = new Blob([arr],{type:"application/pdf"});
      cvSwitch("pdf"); return;
    }
  } catch{}
  // Fallback: offer download and Overleaf
  toast("Local server not running — download .tex and compile in Overleaf","warn");
  dlTex();
}

function dlPDF(){
  if(window._pdfBlob){
    const a=document.createElement("a"); a.href=URL.createObjectURL(window._pdfBlob);
    a.download=(DB.personal.name||"cv").replace(/\s+/g,"_").toLowerCase()+"_cv.pdf";
    a.click();
  } else { toast("Generate and compile PDF first","warn"); }
}

async function genTex(){
  const b = document.getElementById("cv-body");
  if(b) b.innerHTML = loading("Generating LaTeX...");
  const r=aResult, incl=r?(r.included||[]):null, tb=r?(r.tailoredBullets||{}):{};
  const bl = (id,base) => tb[id]||base||[];
  const vis = id => !incl||incl.includes(id);
  const profV = (DB.professional||[]).filter(e=>vis(e.id));
  const acadV = (DB.academic||[]).filter(e=>vis(e.id));
  const projV = (DB.projects||[]).filter(e=>vis(e.id));

  const nm = (DB.personal.name||"First Last").trim().split(" ");
  const last=nm.pop()||"", first=nm.join(" ")||"Name";

  const contacts=[];
  if(DB.personal.phone)  contacts.push(`\\phone[mobile]{${te(DB.personal.phone)}}`);
  if(DB.personal.email)  contacts.push(`\\email{${DB.personal.email}}`);
  if(DB.personal.website)contacts.push(`\\homepage{${DB.personal.website.replace(/^https?:\/\//,"")}}`);
  if(DB.personal.linkedin){const s=DB.personal.linkedin.replace(/.*\/in\//,"").replace(/\/$/,"");contacts.push(`\\social[linkedin]{${s}}`);}
  if(DB.personal.github) {const s=DB.personal.github.replace(/.*github\.com\//,"").replace(/\/$/,"");contacts.push(`\\social[github]{${s}}`);}

  function cventry(e, buls){
    const items = (buls||[]).length
      ? `\n\\begin{itemize}\n${buls.map(b=>`  \\item ${tb2(b)}`).join("\n")}\n\\end{itemize}` : "";
    return `\\cventry{${te(e.date||"")}}{${te(e.title||e.degree||"")}}{${te(e.company||e.institution||e.org||"")}}{${te(e.location||"")}}{}{${items}}`;
  }

  tex = `%% Generated by Aerospace Career Platform
\\documentclass[11pt,a4paper,sans]{moderncv}
\\moderncvstyle{banking}
\\moderncvcolor{blue}
\\usepackage[utf8]{inputenc}
\\usepackage[T1]{fontenc}
\\usepackage[scale=0.85]{geometry}
\\usepackage{microtype}
\\nopagenumbers{}

\\name{${te(first)}}{${te(last)}}
${contacts.join("\n")}

\\begin{document}
\\makecvtitle
${r?.summary||DB.summary?`\n\\section{Profile}\n\\cvitem{}{${te(r?.summary||DB.summary)}}`:``}
${profV.length?`\n\\section{Professional Experience}\n${profV.map(e=>cventry(e,bl(e.id,e.bullets))).join("\n\n")}`:``}
${acadV.length?`\n\\section{Research Experience}\n${acadV.map(e=>cventry(e,bl(e.id,e.bullets))).join("\n\n")}`:``}
${(DB.education||[]).length?`\n\\section{Education}\n${(DB.education||[]).map(e=>cventry(e,e.details)).join("\n\n")}`:``}
${projV.length?`\n\\section{Projects}\n${projV.map(e=>{const b=bl(e.id,e.bullets);const items=b.length?`\n\\begin{itemize}\n${b.map(x=>`  \\item ${tb2(x)}`).join("\n")}\n\\end{itemize}`:"";return`\\cventry{${te(e.date||"")}}{${te(e.title||"")}}{}{}{}{${items}}`;}).join("\n\n")}`:``}
${(DB.leadership||[]).length?`\n\\section{Leadership \\& Initiatives}\n${(DB.leadership||[]).map(e=>cventry(e,e.bullets)).join("\n\n")}`:``}
${(DB.skills.programming||[]).length?`\n\\section{Skills}
\\cvitem{Programming}{${(DB.skills.programming||[]).join(", ")}}
\\cvitem{Tools}{${(DB.skills.tools||[]).join(", ")}}
\\cvitem{Hardware}{${(DB.skills.hardware||[]).join(", ")}}
\\cvitem{Languages}{${(DB.skills.languages||[]).join(", ")}}`:``}

\\end{document}`;
  return tex;
}

function te(s){ // TeX escape
  if(!s)return"";
  return String(s).replace(/\\/g,"\\textbackslash{}").replace(/&/g,"\\&").replace(/%/g,"\\%")
    .replace(/\$/g,"\\$").replace(/#/g,"\\#").replace(/_/g,"\\_")
    .replace(/\^/g,"\\textasciicircum{}").replace(/~/g,"\\textasciitilde{}");
}
function tb2(s){ // bullet safe escape (already may have \%)
  if(!s)return String(s||"");
  return String(s).replace(/(?<!\\)&/g,"\\&").replace(/(?<!\\)#/g,"\\#").replace(/(?<!\\)\$/g,"\\$");
}
function copyTex(){navigator.clipboard.writeText(tex||"").then(()=>{const b=document.getElementById("cp-tex");if(b){b.textContent="✓";setTimeout(()=>b.textContent="📋 Copy",1800);}});}
function dlTex(){
  if(!tex){toast("Generate LaTeX first","warn");return;}
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([tex],{type:"text/plain"}));
  a.download="cv.tex";a.click();toast("Downloaded cv.tex — commit to your repo!");
}

async function ai(prompt, max=1000){
  const r = await fetch(AI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:AI_MODEL,max_tokens:max,messages:[{role:"user",content:prompt}]})});
  const d = await r.json();
  if(d.error) throw new Error(d.error.message||"API error");
  return (d.content||[]).map(i=>i.text||"").join("");
}
function esc(s){ if(s==null)return""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function ej(s){ if(s==null)return""; return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g,"\\n"); }
function cpEl(id){ const el=document.getElementById(id); if(el) navigator.clipboard.writeText(el.value||el.textContent).then(()=>toast("Copied!")); }
function loading(msg){ return `<div style="text-align:center;padding:48px 20px;color:var(--text2);font-size:13px;"><div style="margin-bottom:8px;font-size:20px;">⏳</div>${esc(msg)}</div>`; }
function showModal(h){ document.getElementById("mbox").innerHTML=h; document.getElementById("mbg").style.display="flex"; }
function closeModal(){ document.getElementById("mbg").style.display="none"; }
let _tt;
